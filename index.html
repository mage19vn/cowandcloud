<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILU by Mage__ ❤️</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            /* Tone nền hồng lãng mạn */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex; 
            justify-content: center;
            align-items: center;
            height: 100vh; 
            overflow: hidden; /* Ngăn cuộn trang do hiệu ứng tim bay */
        }

        /* Khung app giả lập điện thoại */
        #app-wrapper {
            position: relative; /* Để chứa hiệu ứng tim bay bên trong khung */
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(255, 154, 158, 0.4);
        }

        @media (min-width: 500px) {
            #app-wrapper {
                height: 90vh;
                border-radius: 25px;
                border: 2px solid rgba(255, 255, 255, 0.8);
            }
        }

        /* Header */
        #chat-header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            text-align: center;
            border-bottom: 1px solid rgba(255, 154, 158, 0.2);
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.1);
            z-index: 10;
        }

        #chat-header h1 {
            font-size: 1.2rem;
            color: #ff4b82; /* Màu chữ hồng đậm */
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
        }

        #chat-header p {
            font-size: 0.8rem;
            color: #ff758c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ff4b82;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff4b82;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 75, 130, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 75, 130, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 75, 130, 0); }
        }

        /* Khu vực tin nhắn */
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            scroll-behavior: smooth;
        }

        #chat-container::-webkit-scrollbar { width: 5px; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(255, 154, 158, 0.5); border-radius: 10px; }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeInUp 0.3s ease forwards;
        }

        .msg-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.received { align-self: flex-start; align-items: flex-start; }

        .msg { 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: 0.95rem; 
            line-height: 1.5; 
            word-wrap: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Tin nhắn gửi - Gradient hồng */
        .msg-wrapper.sent .msg { 
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white; 
            border-bottom-right-radius: 4px; 
        }

        /* Tin nhắn nhận */
        .msg-wrapper.received .msg { 
            background: #ffffff; 
            color: #444; 
            border-bottom-left-radius: 4px; 
            border: 1px solid rgba(255, 154, 158, 0.3);
        }

        .time {
            font-size: 0.7rem;
            color: #a0a0a0;
            margin-top: 4px;
            margin-left: 6px;
            margin-right: 6px;
        }

        /* Khu vực nhập text */
        #input-area { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 15px 20px; 
            display: flex; 
            gap: 12px; 
            border-top: 1px solid rgba(255, 154, 158, 0.2); 
            align-items: center;
            position: relative;
        }

        input { 
            flex: 1; 
            border: 1px solid rgba(255, 154, 158, 0.3); 
            background: #fff0f3;
            padding: 14px 20px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 0.95rem;
            color: #333;
            transition: all 0.3s ease;
        }

        input:focus {
            background: #ffffff;
            border-color: #ff758c;
            box-shadow: 0 0 8px rgba(255, 117, 140, 0.3);
        }

        input::placeholder { color: #ffa3b5; }

        button { 
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white; 
            border: none; 
            width: 45px;
            height: 45px;
            border-radius: 50%; 
            cursor: pointer; 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
            position: relative;
        }

        button:hover { 
            transform: scale(1.08); 
            box-shadow: 0 6px 20px rgba(255, 117, 140, 0.6);
        }
        
        button i { font-size: 1.1rem; margin-left: -2px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Hiệu ứng Trái tim bay --- */
        .flying-heart {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: flyUp 1.5s ease-out forwards;
            z-index: 100;
            opacity: 0;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: translateY(-150px) scale(1.2) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <div id="chat-header">
            <h1>☁️ Cow & Cloud Space 🐄</h1>
            <p><span class="status-dot"></span> Không gian của hai ta</p>
        </div>

        <div id="chat-container"></div>

        <form id="input-area">
            <input type="text" id="msg-input" placeholder="Gửi gắm yêu thương..." autocomplete="off">
            <button type="submit" id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyD0pIanEWQpZwBJhgql758ZR8r5w9nmN6c",
            authDomain: "cowandcloud.firebaseapp.com",
            databaseURL: "https://cowandcloud-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cowandcloud",
            storageBucket: "cowandcloud.firebasestorage.app",
            messagingSenderId: "600573735568",
            appId: "1:600573735568:web:2f63143324e344c6b1de15",
            measurementId: "G-SX40HH3LRY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        let userId = localStorage.getItem("my_chat_id");
        if (!userId) {
            userId = Math.random().toString(36).substring(7);
            localStorage.setItem("my_chat_id", userId);
        }

        const form = document.getElementById('input-area');
        const input = document.getElementById('msg-input');
        const container = document.getElementById('chat-container');
        const sendBtn = document.getElementById('send-btn');
        const appWrapper = document.getElementById('app-wrapper');

        // Hàm tạo hiệu ứng tim bay
        function spawnHearts() {
            const hearts = ['❤️', '💖', '💕', '💗']; // Các loại tim ngẫu nhiên
            const numHearts = 5; // Số lượng tim mỗi lần gửi
            
            const btnRect = sendBtn.getBoundingClientRect();
            const wrapperRect = appWrapper.getBoundingClientRect();
            
            // Tính toán vị trí tương đối so với app-wrapper
            const startX = btnRect.left - wrapperRect.left + (btnRect.width / 2);
            const startY = btnRect.top - wrapperRect.top;

            for (let i = 0; i < numHearts; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.className = 'flying-heart';
                
                // Tọa độ X ngẫu nhiên tỏa ra xung quanh nút gửi
                const randomX = startX + (Math.random() * 60 - 30);
                heart.style.left = `${randomX}px`;
                heart.style.top = `${startY}px`;
                
                // Độ trễ ngẫu nhiên để tim bay lên lộn xộn tự nhiên hơn
                heart.style.animationDelay = `${Math.random() * 0.2}s`;
                
                appWrapper.appendChild(heart);
                
                // Xóa tim khỏi DOM sau khi hoàn thành animation (1.5s + 0.2s delay)
                setTimeout(() => {
                    heart.remove();
                }, 1800);
            }
        }

        form.onsubmit = (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                // Kích hoạt hiệu ứng tim bay
                spawnHearts();

                push(chatRef, {
                    sender: userId,
                    text: input.value,
                    timestamp: Date.now()
                });
                input.value = "";
            }
        };

        onChildAdded(chatRef, (data) => {
            const msg = data.val();
            
            const date = new Date(msg.timestamp);
            const timeString = date.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            const wrapper = document.createElement('div');
            const isMe = msg.sender === userId;
            wrapper.className = `msg-wrapper ${isMe ? 'sent' : 'received'}`;
            
            wrapper.innerHTML = `
                <div class="msg">${msg.text}</div>
                <div class="time">${timeString}</div>
            `;
            
            container.appendChild(wrapper);
            
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        });
    </script>
</body>
</html>
